<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Pyramid</title>
<style>
body {
    font-family: Georgia, serif;
}

table {
    margin: 0 auto;
    border-collapse: collapse;
    width: 60%;
}

caption {
    font-size: 2em;
    padding: 15px;
}

th, td {
    border: 2px solid #333;
    padding: 10px;
}

thead th {
    background-color: #1f6b3a;
    color: white;
}

tbody th {
    text-align: left;
}

</style>
</head>

<body>

<table>
    <caption>USDA Food Pyramid</caption>
    <thead>
        <tr>
            <th rowspan="2">Food Group</th>
            <th colspan="2">Serving Guidelines</th>
        </tr>
        <tr>
            <th>2005-2010</th>
            <th>2011-present</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <th>Dairy<br><em>(milk, yogurt, cheese)</em></th>
            <td>2-3</td>
            <td>3-4</td>
        </tr>
        <tr>
            <th>Meat and Beans<br><em>(beef, poultry, fish, beans)</em></th>
            <td>2-3</td>
            <td>5-6</td>
        </tr>
        <tr>
            <th>Fruits</th>
            <td>2-4</td>
            <td>2-4</td>
        </tr>
        <tr>
            <th>Vegetables</th>
            <td>3-5</td>
            <td>1-2</td>
        </tr>
        <tr>
            <th>Grains<br><em>(bread, donuts, pop tarts)</em></th>
            <td>1-2</td>
            <td>3-5</td>
        </tr>
    </tbody>
</table>

</body>
</html>

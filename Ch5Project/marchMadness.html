<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>March Madness</title>

<style>

body {
    font-family: Georgia, serif;
}

.outer {
    width: 80%;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 30% 40% 30%;
    border: 2px solid #333;
}

.section {
    border: 1px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 10px;
}

.left h1 {
    font-size: 2.5em;
}

.middle {
    display: grid;
    grid-template-rows: auto auto 1fr;
    text-align: center;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
}

.calendar div {
    padding: 5px;
}

.calendar div:nth-child(n+24):nth-child(-n+38) {
    background-color: gold;
}

.calendar div:nth-child(n+39) {
    background-color: transparent;
}

.right h2 {
    margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="outer">

<div class="section left">
    <h1>MARCH<br>MADNESS</h1>
</div>

<div class="section middle">
    <h2>March</h2>

    <div class="calendar">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>

        <div></div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div>
        <div>7</div><div>8</div><div>9</div><div>10</div><div>11</div><div>12</div><div>13</div>
        <div>14</div><div>15</div><div>16</div><div>17</div><div>18</div><div>19</div><div>20</div>
        <div>21</div><div>22</div><div>23</div><div>24</div><div>25</div><div>26</div><div>27</div>
        <div>28</div><div>29</div><div>30</div><div>31</div>
    </div>
</div>

<div class="section right">
    <div>
        <h2>The Tigers</h2>
        <p>
        Hail to thee our alma mater,<br>
        Proudly standing tall and strong.<br>
        Lift your voices high together,<br>
        Sing our victory song.
        </p>
    </div>
</div>

</div>

</body>
</html>

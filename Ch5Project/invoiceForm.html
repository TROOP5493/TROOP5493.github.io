<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice Form</title>

<style>

body {
    font-family: Georgia, serif;
}

.container {
    width: 60%;
    margin: 0 auto;
}

h1 {
    text-align: center;
    color: purple;
}

.grid {
    display: grid;
    grid-template-columns: 40% 20% 20% 20%;
    grid-template-rows: 3em 3em 3em 3em 3em 3em 3em 3em 3em;
    border: 2px solid #333;
}

.cell {
    border: 1px solid #333;
    display: flex;
    align-items: center;
    padding-left: 10px;
}

.header {
    font-weight: bold;
}

.dark {
    background-color: #333;
}

</style>
</head>

<body>

<div class="container">
<h1>Customer Order Form</h1>

<div class="grid">

<div class="cell" style="grid-column: 1 / span 4;">Order Number</div>
<div class="cell" style="grid-column: 1 / span 4;">Order Date</div>

<div class="cell header">Product Name</div>
<div class="cell header">Color</div>
<div class="cell header">Quantity</div>
<div class="cell header">Price</div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell dark" style="grid-column: 1 / span 4;"></div>

<div class="cell" style="grid-column: 1 / span 3;">Subtotal</div>
<div class="cell"></div>

<div class="cell" style="grid-column: 1 / span 3;">Tax</div>
<div class="cell"></div>

<div class="cell" style="grid-column: 1 / span 3;">Shipping</div>
<div class="cell">5.95</div>

<div class="cell" style="grid-column: 1 / span 3;">Total</div>
<div class="cell"></div>

</div>
</div>

</body>
</html>
